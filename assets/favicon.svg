<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="#0a0e17"/>
  <!-- Border accent -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="13" ry="13" fill="none"
        stroke="url(#g)" stroke-width="1.5" opacity="0.6"/>
  <!-- Z letterform -->
  <text x="32" y="46"
        font-family="JetBrains Mono, Fira Code, monospace"
        font-weight="700"
        font-size="36"
        text-anchor="middle"
        fill="url(#g)">Z</text>
